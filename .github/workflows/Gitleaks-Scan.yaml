name: Global Secrets Scan

on:
  workflow_dispatch:

  schedule:
    - cron: "0 0 * * 1"

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Install Gitleaks
        run: |
          VERSION=$(curl -s https://api.github.com/repos/gitleaks/gitleaks/releases/latest | jq -r .tag_name)
          wget -q "https://github.com/gitleaks/gitleaks/releases/download/${VERSION}/gitleaks_${VERSION#v}_linux_x64.tar.gz"
          tar -zxf "gitleaks_${VERSION#v}_linux_x64.tar.gz" -C /tmp
          sudo mv /tmp/gitleaks /usr/local/bin/
      - name: Scan
        id: scan
        env:
          GH_TOKEN: ${{ secrets.WORKFLOW_TOKEN }}
          GITLEAKS_USER: Apocalypsor
          GITLEAKS_EXCLUDE: ${{ secrets.GITLEAKS_EXCLUDE }}
        run: bun run gitleaks-scan
      - name: Send Email
        if: steps.scan.outputs.leaks_found == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "Gitleaks: Secrets detected in your repos"
          to: ${{ secrets.NOTIFY_EMAIL }}
          from: ${{ secrets.SMTP_USERNAME }}
          body: file:///tmp/gitleaks-summary.txt
          attachments: reports/*.json
