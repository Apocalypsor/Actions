name: Vercel Sync

on:
  workflow_dispatch:

  schedule:
    - cron: 0 */6 * * *

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - uses: actions/checkout@v6
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Read state
        run: echo "VERCEL_STATE=$(gh variable get VERCEL_STATE 2>/dev/null || echo '{}')" >> $GITHUB_ENV
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Sync
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_STATE: ${{ env.VERCEL_STATE }}
        run: bun run vercel-update
      - name: Save state
        run: gh variable set VERCEL_STATE --body "$(cat /tmp/vercel-state.json)"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
